[Rainmeter]
Update=50
AccurateText=1
DynamicWindowSize=1
WindowX=60
WindowY=200
OnRefreshAction=[!CommandMeasure MeasureLyricsFetch "Run"]

[Variables]
PanelW=580
PanelH=60

[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist

[MeasurePosition]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Position

[MeasureLyricsFetch]
Measure=Plugin
Plugin=RunCommand
Program=curl.exe
Parameter=-s -G --data-urlencode "artist_name=[MeasureArtist]" --data-urlencode "track_name=[MeasureTitle]" https://lrclib.net/api/search
OutputType=UTF8
State=Hide
DynamicVariables=1
StartInThread=1
UpdateDivider=20
OnUpdateAction=[!CommandMeasure MeasureLyricsFetch "Run"]
FinishAction=[!UpdateMeasure MeasureLyrics][!UpdateMeterGroup Lyrics][!Redraw]

[MeasureLyrics]
Measure=Script
ScriptFile=#@#Scripts\LyricsParser.lua
UpdateDivider=1
DynamicVariables=1

[MeterBackground]
Meter=Shape
Group=Lyrics
Shape=Rectangle 0,0,#PanelW#,#PanelH#,0 | Fill Color 0,0,0,180 | StrokeWidth 1 | Stroke Color 0,0,0,0
DynamicVariables=1

[MeterLyricCurrent]
Meter=String
Group=Lyrics
Text=[&MeasureLyrics:GetLine(0)]
X=(#PanelW#/2)
Y=10
W=(#PanelW#-80)
H=40
FontFace=Segoe UI Semibold
FontSize=18
FontColor=255,0,0,255
StringAlign=Center
AntiAlias=1
ClipString=1
DynamicVariables=1

